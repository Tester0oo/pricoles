name: Build OBS Plugin

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Install OBS Studio SDK
      run: |
        curl -L -o obs-studio.zip https://github.com/obsproject/obs-studio/releases/download/32.1.0/obs-studio-32.1.0-win64.zip
        7z x obs-studio.zip -oobs-studio-temp
        move obs-studio-temp/* obs-studio
        rmdir obs-studio-temp
        
    - name: Build Plugin
      run: |
        mkdir build
        cd build
        cmake .. -G "Visual Studio 17 2022" -A x64
        cmake --build . --config Release
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: competition-overlay
        path: build/Release/*.dll
        if-no-files-found: error
