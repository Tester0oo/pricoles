name: Build OBS Plugin

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      
    - name: Install OBS Studio SDK
      run: |
        curl -L -o obs-studio.zip https://github.com/obsproject/obs-studio/releases/download/32.1.0/OBS-Studio-32.1.0-Windows-x64.zip
        7z x obs-studio.zip -oobs-studio
        
    - name: Setup CMake
      run: |
        cmake --version
        
    - name: Build Plugin
      run: |
        mkdir build
        cd build
        cmake .. -G "Visual Studio 16 2019" -A x64 -DOBS_SDK_PATH="${{ github.workspace }}/obs-studio"
        cmake --build . --config Release
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sorevnovania
        path: Release/*.dll
        if-no-files-found: error
