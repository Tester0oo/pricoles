name: Build OBS Plugin

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Download OBS SDK
      shell: powershell
      run: |
        $obs_version = "29.1.3"
        $url = "https://github.com/obsproject/obs-studio/releases/download/$obs_version/OBS-Studio-$obs_version-win64.zip"
        Invoke-WebRequest -Uri $url -OutFile obs-sdk.zip
        Expand-Archive -Path obs-sdk.zip -DestinationPath obs-sdk
        dir obs-sdk
        
    - name: Setup dependencies
      shell: powershell
      run: |
        $obs_path = (Get-ChildItem -Path "obs-sdk" -Name -Directory | Select-Object -First 1)
        echo "OBS_SDK_PATH=$((Get-Item obs-sdk/$obs_path).FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        
    - name: Build Plugin
      run: |
        mkdir build
        cd build
        cmake .. -G "Visual Studio 17 2022" -A x64 -DLIBOBS_INCLUDE_DIR="${{ env.OBS_SDK_PATH }}\include" -DLIBOBS_LIB_DIR="${{ env.OBS_SDK_PATH }}\lib"
        cmake --build . --config Release
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: competition-overlay
        path: build/Release/*.dll
        if-no-files-found: error
