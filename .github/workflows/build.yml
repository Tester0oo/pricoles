name: Build OBS Plugin

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Download OBS SDK
      shell: powershell
      run: |
        # Получаем последнюю версию из GitHub API
        $releases = Invoke-RestMethod -Uri "https://api.github.com/repos/obsproject/obs-studio/releases" -Headers @{'Accept'='application/vnd.github.v3+json'}
        
        # Ищем последний релиз с windows SDK
        $latest = $releases | Where-Object { -not $_.prerelease } | Select-Object -First 1
        $obs_version = $latest.tag_name -replace 'v', ''
        
        Write-Host "Latest OBS version: $obs_version"
        
        # Пробуем скачать SDK с разными вариантами
        $urls = @(
          "https://github.com/obsproject/obs-studio/releases/download/v$obs_version/OBS-Studio-$obs_version-windows_64.zip",
          "https://github.com/obsproject/obs-studio/releases/download/$obs_version/OBS-Studio-$obs_version-windows_64.zip"
        )
        
        $downloaded = $false
        foreach ($url in $urls) {
          Write-Host "Trying: $url"
          try {
            $ProgressPreference = 'SilentlyContinue'
            Invoke-WebRequest -Uri $url -OutFile obs-sdk.zip -ErrorAction Stop
            Write-Host "Downloaded successfully"
            $downloaded = $true
            break
          } catch {
            Write-Host "Failed: $_"
          }
        }
        
        if (-not $downloaded) {
          Write-Error "Could not download OBS SDK from any URL"
          exit 1
        }
        
        # Распаковываем
        Expand-Archive -Path obs-sdk.zip -DestinationPath obs-sdk -Force
        dir obs-sdk
        
    - name: Setup OBS SDK Path
      shell: powershell
      run: |
        # Находим папку с OBS
        $obs_dirs = Get-ChildItem -Path "obs-sdk" -Directory -Filter "OBS-Studio*" | Select-Object -First 1
        
        if (-not $obs_dirs) {
          $obs_dirs = Get-ChildItem -Path "obs-sdk" -Directory | Select-Object -First 1
        }
        
        $obs_path = $obs_dirs.FullName
        Write-Host "OBS SDK Path: $obs_path"
        
        # Сохраняем в переменную окружения
        Add-Content -Path $env:GITHUB_ENV -Value "OBS_SDK_PATH=$obs_path"
        
    - name: List OBS SDK Contents
      shell: powershell
      run: |
        if (Test-Path "${{ env.OBS_SDK_PATH }}\include") {
          dir "${{ env.OBS_SDK_PATH }}\include"
        } else {
          Write-Host "Include directory not found, checking structure..."
          dir "${{ env.OBS_SDK_PATH }}" -Recurse -Depth 2
        }
        
    - name: Build Plugin
      run: |
        mkdir build
        cd build
        cmake .. -G "Visual Studio 17 2022" -A x64 -DLIBOBS_INCLUDE_DIR="${{ env.OBS_SDK_PATH }}\include" -DLIBOBS_LIB_DIR="${{ env.OBS_SDK_PATH }}\lib\x64"
        cmake --build . --config Release
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: competition-overlay
        path: build/Release/*.dll
        if-no-files-found: error
