name: Build OBS Plugin

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
        
    - name: Download OBS Studio Source
      shell: powershell
      run: |
        $obs_version = "32.1.1"
        $url = "https://github.com/obsproject/obs-studio/archive/refs/tags/$obs_version.zip"
        
        Write-Host "Downloading OBS Studio $obs_version source..."
        $ProgressPreference = 'SilentlyContinue'
        
        try {
          Invoke-WebRequest -Uri $url -OutFile obs-studio.zip -ErrorAction Stop
          Write-Host "Download successful"
        } catch {
          Write-Host "Error downloading: $_"
          exit 1
        }
        
        Write-Host "Extracting OBS Studio..."
        Expand-Archive -Path obs-studio.zip -DestinationPath . -Force
        
        Write-Host "Renaming folder..."
        Rename-Item -Path "obs-studio-$obs_version" -NewName "obs-studio" -Force
        
        Write-Host "OBS Studio extracted successfully"
        Get-ChildItem -Path "obs-studio" -Depth 1
        
    - name: Setup Visual Studio
      uses: microsoft/setup-msbuild@v1.1
      
    - name: Configure CMake
      shell: cmd
      run: |
        mkdir build
        cd build
        cmake .. -G "Visual Studio 17 2022" -A x64
        
    - name: Build Plugin
      shell: cmd
      run: |
        cd build
        cmake --build . --config Release
        
    - name: Check Build Output
      shell: powershell
      run: |
        Write-Host "Checking for build output..."
        if (Test-Path "build/Release/*.dll") {
          Get-ChildItem -Path "build/Release/*.dll"
          Write-Host "Build successful!"
        } else {
          Write-Host "DLL not found in build/Release"
          Get-ChildItem -Path "build" -Recurse -Filter "*.dll"
        }
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: competition-overlay
        path: build/Release/*.dll
        if-no-files-found: error
