name: Build OBS Plugin

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
        
    - name: Setup Visual Studio
      uses: microsoft/setup-msbuild@v1.1
      
    - name: Configure CMake
      shell: cmd
      run: |
        mkdir build
        cd build
        cmake .. -G "Visual Studio 17 2022" -A x64
        
    - name: Build Plugin
      shell: cmd
      run: |
        cd build
        cmake --build . --config Release
        
    - name: Check Build Output
      shell: powershell
      run: |
        Write-Host "Checking for build output..."
        if (Test-Path "build/Release/*.dll") {
          Get-ChildItem -Path "build/Release/*.dll"
          Write-Host "Build successful!"
        } else {
          Write-Host "DLL not found in build/Release"
          Get-ChildItem -Path "build" -Recurse -Filter "*.dll"
        }
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: competition-overlay
        path: build/Release/*.dll
        if-no-files-found: error
