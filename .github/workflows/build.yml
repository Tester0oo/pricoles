name: Build OBS Plugin

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Download OBS Studio Source
      shell: powershell
      run: |
        $obs_version = "32.1.1"
        $url = "https://github.com/obsproject/obs-studio/archive/refs/tags/$obs_version.zip"
    
        Write-Host "Downloading OBS Studio source..."
        $ProgressPreference = 'SilentlyContinue'
        Invoke-WebRequest -Uri $url -OutFile obs-studio.zip
    
        Expand-Archive -Path obs-studio.zip -DestinationPath . -Force
        Rename-Item -Path "obs-studio-$obs_version" -NewName "obs-studio"
        
    - name: Setup OBS SDK Path
      shell: powershell
      run: |
        # Находим папку с OBS
        $obs_dirs = Get-ChildItem -Path "obs-sdk" -Directory -Filter "OBS-Studio*" | Select-Object -First 1
        
        if (-not $obs_dirs) {
          $obs_dirs = Get-ChildItem -Path "obs-sdk" -Directory | Select-Object -First 1
        }
        
        $obs_path = $obs_dirs.FullName
        Write-Host "OBS SDK Path: $obs_path"
        
        # Сохраняем в переменную окружения
        Add-Content -Path $env:GITHUB_ENV -Value "OBS_SDK_PATH=$obs_path"
        
    - name: List OBS SDK Contents
      shell: powershell
      run: |
        if (Test-Path "${{ env.OBS_SDK_PATH }}\include") {
          dir "${{ env.OBS_SDK_PATH }}\include"
        } else {
          Write-Host "Include directory not found, checking structure..."
          dir "${{ env.OBS_SDK_PATH }}" -Recurse -Depth 2
        }
        
    - name: Build Plugin
      run: |
        mkdir build
        cd build
        cmake .. -G "Visual Studio 17 2022" -A x64 -DLIBOBS_INCLUDE_DIR="${{ env.OBS_SDK_PATH }}\include" -DLIBOBS_LIB_DIR="${{ env.OBS_SDK_PATH }}\lib\x64"
        cmake --build . --config Release
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: competition-overlay
        path: build/Release/*.dll
        if-no-files-found: error
