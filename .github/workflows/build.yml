name: Build OBS Plugin

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Download OBS SDK
      run: |
        # Скачиваем заголовки OBS
        Invoke-WebRequest -Uri "https://github.com/obsproject/obs-studio/releases/download/32.1.0/OBS-Studio-32.1.0-Full-x64-Installer.exe" -OutFile "obs-installer.exe"
        
    - name: Setup Build Environment
      run: |
        mkdir -Force obs-studio/include
        mkdir -Force obs-studio/lib
        # Если ваш submodule уже содержит SDK, используйте его
        # Иначе извлеките из скачанного архива
        
    - name: Build Plugin
      run: |
        mkdir build
        cd build
        cmake .. -G "Visual Studio 17 2022" -A x64
        cmake --build . --config Release
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: competition-overlay
        path: build/Release/*.dll
        if-no-files-found: error
